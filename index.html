<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 100; background: #0a0a0a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .header h1 { font-size: 20px; }
        .header span { font-size: 12px; color: #888; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; }
        .tabs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #1a1a1a; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; background: #1a1a1a; color: #aaa; }
        .tab.active { background: #e50914; color: #fff; }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
        .video-card { cursor: pointer; }
        .video-card:active { transform: scale(0.95); }
        .video-card .poster { aspect-ratio: 3/4; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #333; }
        .video-card .title { font-size: 12px; margin-top: 6px; color: #ccc; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .player-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; display: none; flex-direction: column; }
        .player-page.active { display: flex; }
        .player-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.9); }
        .back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 18px; cursor: pointer; }
        .player-title { font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: auto; max-height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading, .empty-msg { text-align: center; padding: 60px 20px; color: #555; }
        .spinner { width: 36px; height: 36px; border: 3px solid #1a1a1a; border-top-color: #e50914; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>播放器</h1>
        <span id="sourceCount">0个源</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="video-grid" id="videoGrid">
        <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
    </div>
    <div class="player-page" id="playerPage">
        <div class="player-header">
            <button class="back-btn" onclick="closePlayer()">✕</button>
            <span class="player-title" id="playerTitle"></span>
        </div>
        <div class="player-container" id="playerContainer"></div>
    </div>

    <script>
       
        const CONFIG_URL = 'https://3maymo.github.io/player-config/config.json';

        let config = null, currentSource = null, currentPage = 1, isLoading = false, hasMore = true;

        async function loadConfig() {
            try {
                const response = await fetch(CONFIG_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                config = await response.json();
                alert('配置加载成功！共 ' + config.sites.length + ' 个站点');
            } catch(e) {
                alert('配置加载失败: ' + e.message);
                config = { sites: [] };
            }
            document.getElementById('sourceCount').textContent = config.sites.filter(s => s.enabled !== false).length + '个源';
            renderTabs();
            if (config.sites.length > 0) switchSource(0);
            else document.getElementById('videoGrid').innerHTML = '<div class="empty-msg">暂无可用源</div>';
        }

        function renderTabs() {
            document.getElementById('tabs').innerHTML = config.sites.map((s, i) => {
                return `<div class="tab" data-index="${i}" onclick="switchSource(${i})" style="${s.enabled===false?'opacity:0.3':''}">${s.name}</div>`;
            }).join('');
        }

        function switchSource(index) {
            currentSource = index; currentPage = 1; hasMore = true;
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===index));
            document.getElementById('videoGrid').innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
            loadVideos();
        }

    async function loadVideos() {
    if (isLoading || !hasMore) return;
    isLoading = true;
    const site = config.sites[currentSource];
    const r = site.listRule;
    let url = site.baseUrl + r.url;
    if (r.pageParam) url += (url.includes('?')?'&':'?') + r.pageParam + '=' + currentPage;
    try {
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(proxyUrl, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error('HTTP错误: ' + res.status);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const items = doc.querySelectorAll(r.itemSelector);
        if (currentPage === 1) document.getElementById('videoGrid').innerHTML = '';
        if (items.length === 0 && currentPage === 1) {
            document.getElementById('videoGrid').innerHTML = '<div class="empty-msg">暂无内容，请检查选择器或网页结构</div>';
        } else if (items.length === 0) {
            hasMore = false;
        } else {
            items.forEach(item => {
                const title = (r.titleSelector ? item.querySelector(r.titleSelector) : item)?.textContent?.trim() || '无标题';
                let link = item.getAttribute(r.linkAttr) || item.querySelector('a')?.getAttribute('href') || '';
                if (link && !link.startsWith('http')) link = site.baseUrl + (link.startsWith('/')?'':'/') + link;
                if (title && link) {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => openPlayer(title, link);
                    card.innerHTML = `<div class="poster">🎬</div><div class="title">${title}</div>`;
                    document.getElementById('videoGrid').appendChild(card);
                }
            });
            currentPage++;
        }
    } catch(e) {
        if (currentPage === 1) {
            document.getElementById('videoGrid').innerHTML = '<div class="empty-msg">加载失败: 网络超时或目标站无法访问。<br>可尝试更换代理或检查网址。</div>';
        }
    }
    isLoading = false;
}

        async function openPlayer(title, link) {
            document.getElementById('playerPage').classList.add('active');
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(link);
                const res = await fetch(proxy);
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const site = config.sites[currentSource];
                let videoUrl = '';
                const vEl = doc.querySelector(site.detailRule.videoSelector);
                if (vEl) videoUrl = vEl.getAttribute(site.detailRule.videoAttr) || '';
                if (videoUrl) {
                    document.getElementById('playerContainer').innerHTML = `<video controls autoplay><source src="${videoUrl}"></video>`;
                } else {
                    document.getElementById('playerContainer').innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
                }
            } catch(e) {
                document.getElementById('playerContainer').innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
            }
        }

        function closePlayer() {
            document.getElementById('playerPage').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
        }

        window.addEventListener('scroll', () => {
            if (isLoading || !hasMore) return;
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            if (scrollTop + clientHeight >= scrollHeight - 300) loadVideos();
        });

        loadConfig();
    </script>
</body>
</html>
